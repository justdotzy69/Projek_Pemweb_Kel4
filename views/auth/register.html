<div class="auth-shell">
  <div class="auth-lore">
    <div class="auth-logo">QUEST<span style="color:var(--parchment)">LY</span></div>
    <p class="auth-tagline">Mulai dari Level 1. Selesaikan quest, kumpulkan XP, dan buktikan dirimu sebagai legenda.</p>
    <div class="auth-pillars">
      <div><strong>Gratis</strong> Selamanya</div>
      <div><strong>Tanpa</strong> Batas Quest</div>
      <div><strong>Badge</strong> Eksklusif</div>
    </div>
  </div>

  <div class="auth-panel">
    <h1>Buat Akun Baru</h1>
    <p class="sub">Mulai petualanganmu hari ini</p>
    <form id="register-form">
      <label>Email
        <input type="email" id="email" placeholder="kamu@email.com" required autofocus/>
      </label>
      <label>Password
        <input type="password" id="password" placeholder="Minimal 6 karakter" required/>
      </label>
      <label>Konfirmasi Password
        <input type="password" id="confirm" placeholder="Ulangi password" required/>
      </label>
      <button type="submit" class="btn btn-primary">Daftar</button>
    </form>
    <div id="form-message" hidden></div>
    <p class="auth-foot">Sudah punya akun? <a href="/login">Masuk</a></p>
  </div>
</div>
