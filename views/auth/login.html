<div class="auth-shell">
  <div class="auth-lore">
    <div class="auth-logo">QUEST<span style="color:var(--parchment)">LY</span></div>
    <p class="auth-tagline">Jadikan tugasmu sebuah petualangan epik. Kumpulkan XP, naik level, dan raih badge legenda.</p>
    <div class="auth-pillars">
      <div><strong>+10 XP</strong> Quest Easy</div>
      <div><strong>+20 XP</strong> Quest Medium</div>
      <div><strong>+30 XP</strong> Quest Hard</div>
    </div>
  </div>

  <div class="auth-panel">
    <h1>Masuk ke Guild</h1>
    <p class="sub">Lanjutkan petualanganmu</p>
    <form id="login-form">
      <label>Email
        <input type="email" id="email" placeholder="kamu@email.com" required autofocus/>
      </label>
      <label>Password
        <input type="password" id="password" placeholder="••••••••" required/>
      </label>
      <button type="submit" class="btn btn-primary">Masuk</button>
    </form>
    <div id="form-message" hidden></div>
    <p class="auth-foot">Belum punya akun? <a href="/register">Daftar sekarang</a></p>
  </div>
</div>
